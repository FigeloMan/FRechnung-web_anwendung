<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRechnung</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0f;color:#e8eaf0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes pulseGlow{0%,100%{box-shadow:0 6px 24px rgba(99,102,241,0.35)}50%{box-shadow:0 6px 36px rgba(99,102,241,0.6)}}
    .btn-p{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 6px 24px rgba(99,102,241,0.35)}
    .btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(99,102,241,0.5)}
    .btn-s{background:rgba(255,255,255,0.05);color:#8090a8;border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s,color .2s}
    .btn-s:hover{background:rgba(255,255,255,0.08);color:#c0c8d8}
    input,textarea,select{width:100%;padding:8px 11px;border-radius:7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);color:#e0e4ec;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s,background .2s}
    input:focus,textarea:focus,select:focus{border-color:rgba(99,102,241,0.6);background:rgba(255,255,255,0.07)}
    textarea{resize:vertical}select option{background:#1a1f2e}
    .lbl{font-size:10px;font-weight:700;color:#4a5468;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;display:block}
    .fw{margin-bottom:10px}
    .card{background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px;backdrop-filter:blur(10px);box-shadow:0 4px 24px rgba(0,0,0,0.25)}
    .card-title{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px;font-weight:700;color:#c0c8dc;letter-spacing:.06em;text-transform:uppercase}
    .thr{display:grid;grid-template-columns:30px 1fr 80px 60px 110px 110px 36px;gap:8px;padding:8px 14px;background:rgba(59,130,246,0.08);font-size:10px;font-weight:700;color:#5a6880;letter-spacing:.12em;text-transform:uppercase}
    .trw{display:grid;grid-template-columns:30px 1fr 80px 60px 110px 110px 36px;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;align-items:center;animation:fadeIn .25s ease}
    .trw:nth-child(even){background:rgba(255,255,255,0.02)}
    .toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
    .ts{background:rgba(22,163,74,0.9);color:#fff;border:1px solid rgba(34,197,94,0.4)}
    .te{background:rgba(185,28,28,0.9);color:#fff;border:1px solid rgba(239,68,68,0.4)}
    .sbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);font-size:10px;color:#4ade80;font-weight:600}
    .sdot{width:6px;height:6px;border-radius:50%;background:#4ade80}
    .b2gblock{background:linear-gradient(135deg,rgba(14,30,48,0.95),rgba(10,22,40,0.95));border:1.5px solid rgba(126,200,227,0.35);border-radius:12px;padding:14px;animation:fadeIn .25s ease}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const API="/api";
const SK="frechnung_provider";
const fmt=n=>typeof n==="number"?n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" \u20ac":"\u2014";
const today=new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
const TDESC={"Klassisch Blau":"Farbiger Kopf \u00b7 alternierende Zeilen","Modern Minimal":"Nur Linien \u00b7 viel Wei\xdfraum","Bold Dunkel":"Schwarzes Band \u00b7 Goldakzent","Elegant Gr\xfcn":"Linker Balken \u00b7 Zebra-Muster","Corporate Grau":"Au\xdfenrahmen \u00b7 gestrichelte Linien","Sunset Orange":"Warmton \u00b7 Akzenttrennlinien","Premium Navy":"Navy-Band \u00b7 Gold-Linie","Bauunternehmen":"Doppelband-Kopf \u00b7 Orange"};
const EMPTY={company_name:"",owner:"",contact_person:"",phone:"",email:"",address:"",tax_id:"",creditor_reference:"",bank:"",bank_account:"",bank_bic:"",logo_b64:"",logo_name:""};

function loadS(){try{const r=sessionStorage.getItem(SK);return r?JSON.parse(r):null}catch{return null}}
function saveS(d){try{sessionStorage.setItem(SK,JSON.stringify(d))}catch{}}

function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t)},[]);
  return <div className={"toast "+(type==="success"?"ts":"te")}>{msg}</div>;
}

function Field({label,id,placeholder,defaultValue,type,rows=2,accent,value,onChange,required}){
  const ac=accent||"rgba(99,102,241,0.6)";
  const isC=value!==undefined;
  const h={onChange:onChange?e=>onChange(e.target.value):undefined,onFocus:e=>{e.target.style.borderColor=ac;e.target.style.background="rgba(255,255,255,0.07)"},onBlur:e=>{e.target.style.borderColor=accent?accent+"44":"rgba(255,255,255,0.09)";e.target.style.background="rgba(255,255,255,0.05)"}};
  const s=accent?{width:"100%",borderColor:accent+"44"}:{width:"100%"};
  const p=isC?{value,...h}:{defaultValue,...h};
  return(
    <div className="fw">
      {label&&<label className="lbl" style={accent?{color:accent}:{}}>{label}{required&&<span style={{color:"#f87171"}}> *</span>}</label>}
      {type==="textarea"?<textarea id={id} rows={rows} placeholder={placeholder} style={s} {...p}/>:<input id={id} type="text" placeholder={placeholder} style={s} {...p}/>}
    </div>
  );
}

function Card({title,icon,children,style:ex}){
  return(
    <div className="card" style={ex}>
      <div className="card-title"><span>{icon}</span><span>{title}</span></div>
      {children}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("invoice");
  const [mode,setMode]=useState("B2C");
  const [items,setItems]=useState([]);
  const [themes,setThemes]=useState(Object.keys(TDESC));
  const [theme,setTheme]=useState("Klassisch Blau");
  const [totals,setTotals]=useState(null);
  const [pdfB64,setPdfB64]=useState(null);
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState(null);
  const [ni,setNi]=useState({name:"",qty:"1",unit:"Stk.",price:""});
  const [prov,setProv]=useState(()=>loadS()||EMPTY);
  const show=(msg,type="success")=>setToast({msg,type,key:Date.now()});
  const val=id=>document.getElementById(id)?.value?.trim()||"";
  const setP=k=>v=>setProv(p=>({...p,[k]:v}));

  useEffect(()=>{fetch(`${API}/themes`).then(r=>r.json()).then(setThemes).catch(()=>{})},[]);

  const addItem=()=>{
    const q=parseFloat(ni.qty),p=parseFloat(ni.price.replace(",","."));
    if(!ni.name||isNaN(q)||isNaN(p)||q<=0||p<0){show("Ung\xfcltige Eingabe \u2013 bitte pr\xfcfen.","error");return}
    setItems(prev=>[...prev,{id:Date.now(),name:ni.name,qty:q,unit:ni.unit,price:p,total:q*p}]);
    setNi({name:"",qty:"1",unit:"Stk.",price:""});
  };

  const calc=()=>{
    if(!items.length){show("Bitte erst Artikel hinzuf\xfcgen.","error");return null}
    const raw=items.reduce((s,i)=>s+i.total,0);
    const disc=parseFloat(val("discount")||"0")||0;
    const tax=parseFloat(val("taxrate")||"19")||19;
    const da=raw*(disc/100),sub=raw-da,taxA=sub*(tax/100),total=sub+taxA;
    const t={raw,da,sub,taxA,total,disc,tax};
    setTotals(t);return t;
  };

  const generatePdf=async()=>{
    if(!items.length){show("Keine Artikel vorhanden.","error");return}
    if(!val("customer_name")){show("Kundenname fehlt.","error");return}
    if(!val("invoice_number")){show("Rechnungsnummer fehlt.","error");return}
    if(mode==="B2G"&&!val("leitweg_id")){show("Leitweg-ID ist Pflicht bei B2G.","error");return}
    if(!prov.company_name){show("Firmenname fehlt \u2013 bitte unter Dienstleister ausf\xfcllen.","error");return}
    const t=calc();if(!t)return;
    const days=parseInt(val("payment_days")||"14");
    let due="";
    try{const[d,m,y]=val("invoice_date").split(".");const dt=new Date(+y,+m-1,+d);dt.setDate(dt.getDate()+days);due=dt.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})}catch{}
    const payload={
      invoice:{invoice_number:val("invoice_number"),invoice_date:val("invoice_date")||today,delivery_date:val("delivery_date")||today,due_date:due,subtotal:t.sub,tax_rate:t.tax,tax_amount:t.taxA,total:t.total,discount_percent:t.disc,discount_amount:t.da,purchase_order_number:val("purchase_order"),buyer_reference:val("buyer_reference"),payment_terms:val("payment_terms"),notes:val("notes")},
      receiver:{customer_name:val("customer_name"),customer_address:val("customer_address"),customer_number:mode!=="B2C"?val("customer_number"):"",customer_vat:mode!=="B2C"?val("customer_vat"):"",Object:val("object_field"),aus:val("aus_field"),leistungszeitraum:val("leistungszeitraum"),leitweg_id:mode==="B2G"?val("leitweg_id"):"",contract_ref:mode==="B2G"?val("contract_ref"):"",cost_center:mode==="B2G"?val("cost_center"):""},
      items:items.map(i=>({product_name:i.name,quantity:i.qty,unit_price:i.price,total_price:i.total,unit:i.unit,unit_code:"C62"})),
      company:{company_name:prov.company_name,owner:prov.owner,contact_person:prov.contact_person,phone:prov.phone,email:prov.email,address:prov.address,tax_id:prov.tax_id,creditor_reference:prov.creditor_reference,bank:prov.bank,bank_account:prov.bank_account,bank_bic:prov.bank_bic,logo_path:""},
      logo_b64:prov.logo_b64||"",theme,
    };
    setLoading(true);
    try{
      const res=await fetch(`${API}/generate-pdf`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const data=await res.json();
      if(data.ok){setPdfB64(data.pdf_base64);show("\u2705 PDF erfolgreich generiert!")}
      else show("Fehler: "+data.error,"error");
    }catch(e){show("Verbindungsfehler: "+e.message,"error")}
    setLoading(false);
  };

  const savePdf=()=>{
    if(!pdfB64){show("Zuerst PDF generieren.","error");return}
    const blob=new Blob([Uint8Array.from(atob(pdfB64),c=>c.charCodeAt(0))],{type:"application/pdf"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`Rechnung_${val("invoice_number")||"Rechnung"}.pdf`;a.click();
    show("Download gestartet.");
  };

  const previewPdf=()=>{
    if(!pdfB64){show("Zuerst PDF generieren.","error");return}
    const blob=new Blob([Uint8Array.from(atob(pdfB64),c=>c.charCodeAt(0))],{type:"application/pdf"});
    window.open(URL.createObjectURL(blob),"_blank");
  };

  const uploadLogo=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const b64=ev.target.result.split(",")[1];
      try{
        const res=await fetch(`${API}/provider/logo/upload`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:b64,name:file.name})});
        const data=await res.json();
        if(data.ok){setProv(p=>({...p,logo_b64:b64,logo_name:file.name}));show("Logo gespeichert: "+file.name)}
        else show("Logo-Fehler: "+data.error,"error");
      }catch{setProv(p=>({...p,logo_b64:b64,logo_name:file.name}));show("Logo lokal gespeichert.")}
    };
    reader.readAsDataURL(file);
  };

  const saveProvider=()=>{saveS(prov);show("\u2705 In dieser Session gespeichert!")};
  const clearSession=()=>{if(!confirm("Alle Firmendaten dieser Session l\xf6schen?"))return;sessionStorage.removeItem(SK);setProv(EMPTY);show("Session gel\xf6scht.")};

  const bg={position:"fixed",inset:0,pointerEvents:"none",zIndex:0,background:"radial-gradient(ellipse 80% 50% at 15% 10%,rgba(59,130,246,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 85% 85%,rgba(99,102,241,0.05) 0%,transparent 60%)"};
  const gr={position:"fixed",inset:0,pointerEvents:"none",zIndex:0,backgroundImage:"linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px)",backgroundSize:"60px 60px"};

  return(
    <div style={{minHeight:"100vh",position:"relative"}}>
      <div style={bg}/><div style={gr}/>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"0 24px 60px",position:"relative",zIndex:1}}>

        {/* Header */}
        <div style={{padding:"32px 0 24px",display:"flex",alignItems:"center",gap:16}}>
          <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#3b82f6,#6366f1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,boxShadow:"0 0 24px rgba(99,102,241,0.4)"}}>📄</div>
          <div>
            <div style={{fontSize:24,fontWeight:800,letterSpacing:"-0.5px"}}>FRechnung</div>
            <div style={{fontSize:11,color:"#3a4050",letterSpacing:"0.12em",textTransform:"uppercase",marginTop:2}}>Rechnungserstellung · Cloud</div>
          </div>
          <div style={{marginLeft:16}}>
            <div className="sbadge"><div className="sdot"/> PRIVATE SESSION</div>
            <div style={{fontSize:10,color:"#2a3040",marginTop:3}}>Daten bleiben in diesem Tab</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8}}>
            {[["invoice","Rechnungsdaten"],["provider","Dienstleister"]].map(([t,l])=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,background:tab===t?"linear-gradient(135deg,#3b82f6,#6366f1)":"rgba(255,255,255,0.05)",color:tab===t?"#fff":"#7a8090",boxShadow:tab===t?"0 4px 16px rgba(99,102,241,0.3)":"none",transition:"all .2s"}}>{l}</button>
            ))}
          </div>
        </div>

        {/* ── INVOICE TAB ── */}
        {tab==="invoice"&&(
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            {!prov.company_name&&(
              <div style={{padding:"12px 16px",borderRadius:10,background:"rgba(251,146,60,0.08)",border:"1px solid rgba(251,146,60,0.3)",fontSize:13,color:"#fb923c",display:"flex",alignItems:"center",gap:8}}>
                ⚠️ Firmenname fehlt — bitte zuerst unter <strong style={{cursor:"pointer",textDecoration:"underline"}} onClick={()=>setTab("provider")}>Dienstleister</strong> ausf\xfcllen.
              </div>
            )}

            <Card title="Rechnungsart" icon="⚡">
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {[{v:"B2C",l:"B2C",s:"Privatperson",c:"#22c55e"},{v:"B2B",l:"B2B",s:"Unternehmen",c:"#3b82f6"},{v:"B2G",l:"B2G",s:"Beh\xf6rde / \xf6ffentl. Auftraggeber",c:"#7ec8e3"}].map(({v,l,s,c})=>(
                  <button key={v} onClick={()=>setMode(v)} style={{padding:"12px 22px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",border:`1.5px solid ${mode===v?c:"rgba(255,255,255,0.08)"}`,background:mode===v?`rgba(${v==="B2G"?"126,200,227":v==="B2B"?"59,130,246":"34,197,94"},0.1)`:"rgba(255,255,255,0.03)",display:"flex",flexDirection:"column",alignItems:"flex-start",transition:"all .2s"}}>
                    <span style={{fontWeight:800,fontSize:15,color:mode===v?c:"#aaa"}}>{l}</span>
                    <span style={{fontSize:11,color:"#5a6070",marginTop:2}}>{s}</span>
                  </button>
                ))}
              </div>
            </Card>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <Card title="Kundendaten" icon="👤">
                <Field label="Name / Firmenname" id="customer_name" placeholder="Max Mustermann GmbH" required/>
                <Field label="Anschrift" id="customer_address" placeholder={"Musterstra\xdfe 1\n12345 Berlin"} type="textarea" rows={2}/>
                <Field label="Objekt / Bauvorhaben" id="object_field" placeholder="z.B. Sanierung EG"/>
                <Field label="Ausf\xfchrung" id="aus_field" placeholder="z.B. 01.01.\u201328.02.2025"/>
                <Field label="Leistungszeitraum" id="leistungszeitraum" placeholder="01.01.\u201331.01.2025"/>
                {(mode==="B2B"||mode==="B2G")&&(
                  <div style={{marginTop:12,borderTop:"1px solid rgba(59,130,246,0.2)",paddingTop:12,animation:"fadeIn .2s ease"}}>
                    <div style={{marginBottom:10,display:"inline-block",background:"rgba(59,130,246,0.15)",color:"#60a5fa",border:"1px solid rgba(59,130,246,0.3)",borderRadius:5,fontSize:10,fontWeight:700,padding:"1px 7px"}}>B2B-Felder</div>
                    <Field label="Kundennummer" id="customer_number" placeholder="KD-00123"/>
                    <Field label="USt-ID des Kunden" id="customer_vat" placeholder="DE123456789"/>
                  </div>
                )}
                {mode==="B2G"&&(
                  <div style={{marginTop:12}}>
                    <div className="b2gblock">
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                        <span style={{fontSize:14}}>🏛️</span>
                        <span style={{display:"inline-block",background:"rgba(126,200,227,0.12)",color:"#7ec8e3",border:"1px solid rgba(126,200,227,0.3)",borderRadius:5,fontSize:10,fontWeight:700,padding:"1px 7px"}}>B2G — E-Rechnung</span>
                      </div>
                      <Field label="Leitweg-ID" id="leitweg_id" placeholder="991-1234567890-06" required accent="#7ec8e3"/>
                      <Field label="Vertragsnummer" id="contract_ref" placeholder="VTR-2025-001" accent="#7ec8e3"/>
                      <Field label="Kostenstelle" id="cost_center" placeholder="4200-001" accent="#7ec8e3"/>
                    </div>
                  </div>
                )}
              </Card>

              <Card title="Rechnungsinformationen" icon="📋">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Field label="Rechnungsnummer" id="invoice_number" placeholder="RE-2025-0001" required/>
                  <Field label="Rechnungsdatum" id="invoice_date" defaultValue={today}/>
                  <Field label="Lieferdatum" id="delivery_date" defaultValue={today}/>
                  <Field label="USt.-Satz %" id="taxrate" defaultValue="19"/>
                  <Field label="Rabatt %" id="discount" defaultValue="0"/>
                  <Field label="Zahlungsziel (Tage)" id="payment_days" defaultValue="14"/>
                  <Field label="Bestellnummer (opt.)" id="purchase_order" placeholder="PO-12345"/>
                  <Field label="K\xe4uferreferenz (opt.)" id="buyer_reference" placeholder="KR-98765"/>
                </div>
                <Field label="Zahlungshinweis / Schlusstext" id="payment_terms" type="textarea" rows={2} defaultValue="Zahlbar sofort nach Erhalt der Rechnung ohne Abzug. Vielen Dank f\xfcr Ihren Auftrag!"/>
                <Field label="Interne Bemerkungen (Seitenende)" id="notes" type="textarea" rows={2}/>
              </Card>
            </div>

            <Card title="Artikel / Positionen" icon="📦">
              <div style={{display:"grid",gridTemplateColumns:"3fr 80px 80px 140px auto",gap:10,alignItems:"flex-end",marginBottom:14}}>
                <div className="fw"><label className="lbl">Bezeichnung</label><input placeholder="Dienstleistung XY" value={ni.name} onChange={e=>setNi(p=>({...p,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addItem()}/></div>
                <div className="fw"><label className="lbl">Menge</label><input placeholder="1" value={ni.qty} onChange={e=>setNi(p=>({...p,qty:e.target.value}))}/></div>
                <div className="fw"><label className="lbl">Einheit</label><input placeholder="Stk." value={ni.unit} onChange={e=>setNi(p=>({...p,unit:e.target.value}))}/></div>
                <div className="fw"><label className="lbl">Einzelpreis netto (\u20ac)</label><input placeholder="0,00" value={ni.price} onChange={e=>setNi(p=>({...p,price:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addItem()}/></div>
                <div style={{paddingBottom:10}}><button className="btn-p" onClick={addItem} style={{padding:"9px 18px",borderRadius:8,fontSize:13}}>+ Hinzuf\xfcgen</button></div>
              </div>
              <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",overflow:"hidden",minHeight:90}}>
                {items.length===0
                  ?<div style={{padding:"28px 20px",textAlign:"center",color:"#2a3040",fontSize:13}}>Noch keine Positionen hinzugef\xfcgt</div>
                  :<>
                    <div className="thr"><span>#</span><span>Bezeichnung</span><span>Menge</span><span>Einh.</span><span>Einzelpreis</span><span>Gesamt</span><span/></div>
                    {items.map((item,i)=>(
                      <div className="trw" key={item.id}>
                        <span style={{color:"#3a4858",fontWeight:700,fontSize:11}}>{i+1}</span>
                        <span style={{fontWeight:500}}>{item.name}</span>
                        <span style={{color:"#8090a8"}}>{item.qty.toFixed(2)}</span>
                        <span style={{color:"#8090a8"}}>{item.unit}</span>
                        <span>{fmt(item.price)}</span>
                        <span style={{fontWeight:700}}>{fmt(item.total)}</span>
                        <button onClick={()=>setItems(p=>p.filter(x=>x.id!==item.id))} style={{width:28,height:28,borderRadius:6,border:"none",background:"rgba(239,68,68,0.12)",color:"#ef4444",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
                      </div>
                    ))}
                  </>
                }
              </div>
              {items.length>0&&<div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><button className="btn-s" style={{padding:"6px 14px",fontSize:12}} onClick={()=>{if(confirm("Alle Positionen l\xf6schen?"))setItems([])}}>Alle l\xf6schen</button></div>}
            </Card>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <Card title="Berechnung" icon="🧮">
                <button className="btn-s" style={{width:"100%",padding:11,marginBottom:14}} onClick={calc}>Berechnen</button>
                {totals?(
                  <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.06)"}}>
                    {[["Zwischensumme",totals.raw],...(totals.disc>0?[[`Rabatt (${totals.disc}%)`,-totals.da]]:[]),["Netto",totals.sub],[`USt. (${totals.tax}%)`,totals.taxA]].map(([l,v])=>(
                      <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:13,color:"#8090a8",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                        <span>{l}</span><span style={{color:v<0?"#f87171":"#c8d0dc"}}>{v<0?"\u2212"+fmt(-v):fmt(v)}</span>
                      </div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 2px",borderTop:"1px solid rgba(99,102,241,0.3)",marginTop:4}}>
                      <span style={{fontWeight:800,fontSize:15}}>Brutto</span>
                      <span style={{fontWeight:800,fontSize:20,background:"linear-gradient(90deg,#60a5fa,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{fmt(totals.total)}</span>
                    </div>
                  </div>
                ):<div style={{textAlign:"center",padding:"20px",color:"#2a3040",fontSize:13}}>Artikel hinzuf\xfcgen &amp; Berechnen klicken</div>}
              </Card>

              <Card title="Layout &amp; PDF" icon="🎨">
                <div className="fw">
                  <label className="lbl">Layout-Stil</label>
                  <select value={theme} onChange={e=>setTheme(e.target.value)}>{themes.map(t=><option key={t} value={t}>{t}</option>)}</select>
                </div>
                <div style={{fontSize:11,color:"#5a6880",marginBottom:16,padding:"6px 10px",background:"rgba(255,255,255,0.03)",borderRadius:6,borderLeft:"2px solid rgba(99,102,241,0.4)"}}>{TDESC[theme]||""}</div>
                <button className="btn-p" style={{width:"100%",padding:13,marginBottom:8,animation:loading?"pulseGlow 1s infinite":"none"}} onClick={generatePdf} disabled={loading}>
                  {loading?"⏳ Wird generiert \u2026":"📄 PDF generieren"}
                </button>
                {pdfB64&&<>
                  <div style={{display:"flex",gap:8,marginBottom:8,animation:"fadeIn .3s ease"}}>
                    <button className="btn-s" style={{flex:1,padding:"9px"}} onClick={previewPdf}>🔍 Vorschau</button>
                    <button className="btn-s" style={{flex:1,padding:"9px"}} onClick={savePdf}>💾 Speichern</button>
                  </div>
                  <div style={{padding:"8px 12px",borderRadius:8,background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",fontSize:12,color:"#86efac"}}>✓ PDF bereit — Vorschau oder Speichern</div>
                </>}
              </Card>
            </div>
          </div>
        )}

        {/* ── PROVIDER TAB ── */}
        {tab==="provider"&&(
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div style={{padding:"14px 18px",borderRadius:10,background:"rgba(59,130,246,0.07)",border:"1px solid rgba(59,130,246,0.2)",fontSize:13,color:"#93c5fd"}}>
              🔒 <strong>Datenschutz:</strong> Deine Firmendaten werden <strong>ausschlie\xdflich in diesem Browser-Tab</strong> gespeichert (sessionStorage). Kein Server speichert diese Daten. Beim Schlie\xdfen des Tabs sind sie gel\xf6scht.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <Card title="Firmenlogo" icon="🖼️">
                <label style={{display:"block",border:"2px dashed rgba(255,255,255,0.1)",borderRadius:10,padding:"28px 20px",textAlign:"center",cursor:"pointer",background:"rgba(255,255,255,0.02)",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(99,102,241,0.4)";e.currentTarget.style.background="rgba(99,102,241,0.04)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.1)";e.currentTarget.style.background="rgba(255,255,255,0.02)"}}>
                  {prov.logo_b64
                    ?<img src={`data:image/png;base64,${prov.logo_b64}`} style={{maxHeight:60,maxWidth:200,marginBottom:8,objectFit:"contain"}} alt="Logo"/>
                    :<div style={{fontSize:32,marginBottom:8}}>📁</div>}
                  <div style={{fontSize:13,color:"#6070a0",marginBottom:4}}>Logo ausw\xe4hlen \u2026</div>
                  <div style={{fontSize:11,color:"#3a4050"}}>PNG, JPG, BMP — bleibt nur in diesem Tab</div>
                  <input type="file" accept=".png,.jpg,.jpeg,.bmp" style={{display:"none"}} onChange={uploadLogo}/>
                </label>
                {prov.logo_name&&<div style={{marginTop:8,fontSize:11,color:"#4a6070"}}>✓ {prov.logo_name}</div>}
              </Card>
              <Card title="Bankverbindung" icon="🏦">
                <Field label="Bankname" placeholder="Musterbank AG" value={prov.bank} onChange={setP("bank")}/>
                <Field label="IBAN" placeholder="DE89 3704 0044 0532 0130 00" required value={prov.bank_account} onChange={setP("bank_account")}/>
                <Field label="BIC" placeholder="COBADEFFXXX" value={prov.bank_bic} onChange={setP("bank_bic")}/>
              </Card>
            </div>
            <Card title="Firmeninformationen" icon="🏢">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <Field label="Firmenname" placeholder="Musterfirma GmbH" required value={prov.company_name} onChange={setP("company_name")}/>
                <Field label="Inhaber" placeholder="Max Mustermann" value={prov.owner} onChange={setP("owner")}/>
                <Field label="Ansprechpartner" placeholder="Erika Musterfrau" value={prov.contact_person} onChange={setP("contact_person")}/>
                <Field label="Telefon" placeholder="+49 30 12345678" value={prov.phone} onChange={setP("phone")}/>
                <Field label="E-Mail" placeholder="info@musterfirma.de" value={prov.email} onChange={setP("email")}/>
                <Field label="Steuernummer / USt-IdNr." placeholder="DE123456789" value={prov.tax_id} onChange={setP("tax_id")}/>
                <Field label="Gl\xe4ubiger-ID SEPA (opt.)" placeholder="DE98ZZZ09999999999" value={prov.creditor_reference} onChange={setP("creditor_reference")}/>
              </div>
              <Field label="Anschrift (Zeile 1: Stra\xdfe | Zeile 2: PLZ Ort)" type="textarea" rows={2} placeholder={"Musterstra\xdfe 1\n12345 Berlin"} value={prov.address} onChange={setP("address")}/>
            </Card>
            <div style={{display:"flex",gap:12}}>
              <button className="btn-p" style={{flex:1,padding:"14px",fontSize:15}} onClick={saveProvider}>💾 In dieser Session speichern</button>
              <button className="btn-s" style={{padding:"14px 20px",fontSize:13}} onClick={clearSession}>🗑️ Session l\xf6schen</button>
            </div>
          </div>
        )}
      </div>
      {toast&&<Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
